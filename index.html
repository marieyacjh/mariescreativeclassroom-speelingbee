<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Bee - Marie's Creative Classroom</title>
    <style>
        :root {
            --honey-yellow: #fff9c4;
            --bee-yellow: #ffeb3b;
            --bee-black: #000000;
            --soft-white: #ffffff;
            --border-color: #fbc02d;
            --success-green: #4caf50;
            --game-scale: 1;
        }

        body {
            font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", sans-serif;
            background-color: var(--soft-white);
            color: var(--bee-black);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .menu-bg {
            background-color: #fffde7;
            position: relative;
            overflow: hidden;
        }
        
        .pastel-bee {
            position: absolute; width: 50px; height: 40px; background: var(--bee-yellow);
            border-radius: 50%; border: 2px solid #000; opacity: 0.8; z-index: 0;
            animation: float 6s infinite ease-in-out;
        }
        .pastel-bee::after {
            content: ''; position: absolute; top: 5px; left: 15px;
            width: 10px; height: 30px; border-left: 5px solid #000; border-right: 5px solid #000;
        }
        .pastel-bee::before {
            content: ''; position: absolute; top: -10px; left: 10px;
            width: 20px; height: 15px; background: rgba(255,255,255,0.7); border-radius: 50%;
            box-shadow: 15px 0 0 rgba(255,255,255,0.7);
        }

        @keyframes float {
            0% { left: -10%; transform: translateY(0px) rotate(10deg); }
            50% { transform: translateY(-50px) rotate(-10deg); }
            100% { left: 110%; transform: translateY(0px) rotate(10deg); }
        }

        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; position: relative; z-index: 1; }
        .active { display: flex; }
        
        .main-title { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; margin: 20px 0 0 0; text-align: center; color: var(--bee-black); line-height: 1; }
        .sub-title { font-size: clamp(1.2rem, 5vw, 1.8rem); margin: 0 0 30px 0; font-weight: normal; color: var(--bee-black); text-align: center; }

        .btn {
            background-color: var(--bee-yellow); border: 3px solid var(--bee-black);
            border-radius: 20px; padding: 15px 40px; font-size: 1.5rem; font-weight: bold;
            font-family: inherit; cursor: pointer; margin: 10px; box-shadow: 0 6px 0 var(--bee-black);
            color: var(--bee-black);
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--bee-black); }
        .btn-small { padding: 8px 15px; font-size: 1rem; border-radius: 12px; }
        
        .btn-next { background-color: var(--success-green); color: white; margin-top: 20px; display: none; }

        .game-picker {
            background: #fff; border: 3px solid var(--bee-black); border-radius: 15px;
            padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
            color: var(--bee-black); flex-wrap: wrap; justify-content: center;
        }

        .scoreboard {
            font-size: 2rem; font-weight: bold; color: var(--bee-black);
            background: var(--bee-yellow); padding: 5px 20px; border-radius: 15px;
            border: 3px solid var(--bee-black); margin-bottom: 10px;
        }

        .display-area { font-size: 2.5rem; font-weight: bold; min-height: 60px; margin: 10px; border-bottom: 5px solid var(--bee-black); text-align: center; min-width: 200px; white-space: pre-wrap; word-break: break-word; color: var(--bee-black); }
        .correct-flash { color: var(--success-green); border-bottom-color: var(--success-green) !important; }

        .unscramble-container { 
            display: flex; flex-direction: column; align-items: center; width: 100%; 
            transform: scale(var(--game-scale)); transform-origin: top center;
        }

        .target-slots { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 15px; 
            margin: 20px 0; 
            min-height: 65px; 
            width: 100%; 
        }

        .word-group {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        
        .slot {
            width: clamp(35px, 8vw, 50px); 
            height: clamp(45px, 10vw, 60px); 
            border: 3px dashed #ccc; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; 
            font-size: clamp(1.2rem, 5vw, 1.8rem); 
            font-weight: bold;
            background: rgba(255,255,255,0.5); cursor: default; color: var(--bee-black);
        }
        .slot.filled { cursor: pointer; }
        
        .letter-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 95%; padding: 15px; background: #fdfdfd; border-radius: 20px; border: 2px solid #eee; }
        .tile {
            width: clamp(35px, 8vw, 50px); 
            height: clamp(45px, 10vw, 60px); 
            background: var(--bee-yellow); border: 3px solid var(--bee-black);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.2rem, 5vw, 1.8rem); font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #000; color: var(--bee-black);
        }

        .keyboard { 
            display: flex; flex-direction: column; align-items: center; width: 100%; 
            min-height: 240px;
            transform: scale(var(--game-scale)); transform-origin: top center;
        }
        .kb-row { display: flex; justify-content: center; margin-bottom: 5px; width: 100%; }
        .key {
            min-width: clamp(30px, 8vw, 45px); 
            height: clamp(40px, 10vw, 55px); 
            margin: 2px; background: #fff;
            border: 2px solid var(--bee-black); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1rem; cursor: pointer; user-select: none;
            font-family: inherit; color: var(--bee-black);
        }
        .key-active { background: var(--bee-yellow); border-color: orange; }

        .duel-container { display: flex; width: 100vw; height: 75vh; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; border: 1px solid #ddd; padding: 10px; overflow-y: auto; position: relative; }
        .back-btn { position: absolute; top: 10px; left: 10px; z-index: 100; }
        
        input, textarea { font-family: inherit; font-size: 1.1rem; border-radius: 8px; border: 2px solid #ccc; padding: 5px; color: var(--bee-black); }

        #link-display-box {
            word-break: break-all; background: #eee; padding: 10px; border-radius: 10px;
            font-size: 0.8rem; margin-top: 10px; max-width: 80%; display: none; color: var(--bee-black);
        }

        .control-group {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            margin: 15px 0; padding: 15px; border: 2px solid #ddd; border-radius: 15px;
        }
        .zoom-ctrl { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .radio-group { display: flex; gap: 20px; font-weight: bold; }

        /* History List Styling */
        .history-list {
            width: 80%;
            max-height: 300px;
            overflow-y: auto;
            background: white;
            border: 3px solid var(--bee-black);
            border-radius: 15px;
            padding: 10px;
            margin-top: 20px;
        }
        .history-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:last-child { border-bottom: none; }
        .history-link {
            color: #1976d2;
            text-decoration: none;
            font-size: 0.9rem;
            flex-grow: 1;
            margin-right: 10px;
        }

        @media (max-width: 600px) {
            .duel-container { flex-direction: column; height: auto; }
            .team-side { border: none; border-bottom: 2px solid #eee; min-height: 40vh; }
            .main-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <button class="btn btn-small back-btn" onclick="showScreen('menu-screen')">BACK</button>

    <div id="menu-screen" class="screen active menu-bg">
        <h1 class="main-title">SPELLING BEE</h1>
        <h2 class="sub-title">Marie's Creative Classroom</h2>
        <div id="load-msg" style="color:var(--success-green); font-weight:bold; display:none;">✅ LIST LOADED!</div>
        <button class="btn" onclick="openModeSelect('practice')">PRACTICE</button>
        <button class="btn" onclick="openModeSelect('duel')">TEAM DUEL</button>
        <button class="btn" onclick="showScreen('edit-screen')">EDIT LIST</button>
        <button class="btn" onclick="showScreen('code-screen')">GAME LINK</button>
        <button class="btn" onclick="showHistory()">LINK HISTORY</button>
    </div>

    <div id="mode-screen" class="screen">
        <h2>SELECT STYLE</h2>
        <div class="control-group">
            <p>WORD ORDER:</p>
            <div class="radio-group">
                <label><input type="radio" name="order-p" value="unshuffle" checked> Normal</label>
                <label><input type="radio" name="order-p" value="shuffle"> Shuffle</label>
            </div>
        </div>
        <button class="btn" onclick="startGame('unscramble')">UNSCRAMBLE</button>
        <button class="btn" onclick="startGame('spell')">SPELL IT</button>
    </div>

    <div id="setup-screen" class="screen">
        <h2>TEAM SETUP</h2>
        <div class="control-group">
            <p>WORD ORDER:</p>
            <div class="radio-group">
                <label><input type="radio" name="order-d" value="unshuffle" checked> Normal</label>
                <label><input type="radio" name="order-d" value="shuffle"> Shuffle</label>
            </div>
        </div>
        <div style="display:flex; flex-wrap: wrap; justify-content:center; gap: 20px; margin-bottom: 20px;">
            <div style="text-align:center;">
                <h3>TEAM A</h3>
                <input type="text" id="team-a-name" value="TEAM A"><br><br>
                <input type="text" id="team-a-nums" placeholder="e.g. 1-10" value="1-20">
            </div>
            <div style="text-align:center;">
                <h3>TEAM B</h3>
                <input type="text" id="team-b-name" value="TEAM B"><br><br>
                <input type="text" id="team-b-nums" placeholder="e.g. 1-10" value="1-20">
            </div>
        </div>
        <button class="btn" onclick="confirmSetup()">START DUEL</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-picker">
            <span>Student #</span>
            <input type="text" id="student-list-p" value="1-20" style="width:80px;">
            <button class="btn btn-small" onclick="pickStudent('p')">PICK</button>
            <b id="num-p" style="font-size:1.5rem; margin-left:10px;">-</b>
            <div class="zoom-ctrl" style="margin-left: 20px; border-left: 1px solid #ccc; padding-left: 15px;">
                <span>Zoom:</span>
                <input type="range" min="0.5" max="2" step="0.1" value="1" oninput="adjustZoom(this.value)">
            </div>
        </div>
        <button class="btn" onclick="speakWord()">LISTEN</button>
        <div id="p-play" style="width:100%;"></div>
        <button id="next-btn-p" class="btn btn-next" onclick="nextWord()">NEXT WORD ➔</button>
    </div>

    <div id="duel-screen" class="screen" style="padding:0;">
        <div class="duel-container">
            <div class="team-side">
                <div id="score-l" class="scoreboard">0</div>
                <div class="game-picker">
                    <b id="team-l-label">TEAM A</b>
                    <button class="btn btn-small" onclick="pickStudent('l')">PICK</button>
                    <b id="num-l">-</b>
                </div>
                <div id="l-play"></div>
            </div>
            <div class="team-side">
                <div id="score-r" class="scoreboard">0</div>
                <div class="game-picker">
                    <b id="team-r-label">TEAM B</b>
                    <button class="btn btn-small" onclick="pickStudent('r')">PICK</button>
                    <b id="num-r">-</b>
                </div>
                <div id="r-play"></div>
            </div>
        </div>
        <button class="btn" style="position:fixed; bottom:80px; z-index:1000;" onclick="speakWord()">LISTEN</button>
        <button id="next-btn-duel" class="btn btn-next" style="position:fixed; bottom:10px; width: 250px; z-index:1000;" onclick="nextWord()">NEXT WORD ➔</button>
    </div>

    <div id="edit-screen" class="screen">
        <h2>EDIT LIST</h2>
        <textarea id="word-input" rows="8" cols="35"></textarea>
        <button class="btn" onclick="saveWords()">GENERATE GAME LINK</button>
        <div id="link-display-box"></div>
    </div>

    <div id="code-screen" class="screen">
        <h2>MANUAL LINK LOAD</h2>
        <p>Paste a game link here if needed:</p>
        <input type="text" id="game-code-input" style="width:80%;">
        <button class="btn" onclick="loadByCode()">LOAD</button>
    </div>

    <div id="history-screen" class="screen">
        <h2>LINK HISTORY</h2>
        <p>Last 10 game links opened:</p>
        <div id="history-container" class="history-list"></div>
        <button class="btn btn-small" style="margin-top:20px;" onclick="clearHistory()">CLEAR HISTORY</button>
    </div>

    <script>
        let originalWords = ["Marie", "Creative", "Classroom", "Motivate", "Achieve", "Reflect", "Inspire", "Empower"];
        let currentWords = [...originalWords];
        let wordIndex = 0;
        let gameMode = 'practice';
        let gameStyle = 'spell';
        let isWaitingForNext = false;
        let scoreA = 0;
        let scoreB = 0;

        let capsState = { p: false, l: false, r: false };
        let layoutState = { p: 'qwerty', l: 'qwerty', r: 'qwerty' };

        const qwerty = [
            ["Q","W","E","R","T","Y","U","I","O","P"], 
            ["A","S","D","F","G","H","J","K","L"], 
            ["Z","X","C","V","B","N","M"]
        ];
        const symbols = [
            ["1","2","3","4","5","6","7","8","9","0"],
            ["!", "@", "#", "&", "(", ")", "-", "_"],
            ["\"", ":", ";", "'", "?", "/"]
        ];

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('w');
            
            // History Tracking
            if(data) {
                try {
                    originalWords = JSON.parse(atob(data));
                    currentWords = [...originalWords];
                    document.getElementById('load-msg').style.display = 'block';
                    saveToHistory(window.location.href);
                } catch(e) { console.log("URL load error"); }
            }
            document.getElementById('word-input').value = originalWords.join('\n');
            createBees();
        };

        // --- HISTORY FUNCTIONS ---
        function saveToHistory(link) {
            let history = JSON.parse(localStorage.getItem('spellBeeHistory') || "[]");
            // Remove if already exists (to move to top)
            history = history.filter(item => item !== link);
            // Add to start
            history.unshift(link);
            // Keep only 10
            if(history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('spellBeeHistory', JSON.stringify(history));
        }

        function showHistory() {
            const container = document.getElementById('history-container');
            const history = JSON.parse(localStorage.getItem('spellBeeHistory') || "[]");
            container.innerHTML = history.length ? "" : "<p style='text-align:center'>No history yet</p>";
            
            history.forEach((link, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <a href="${link}" class="history-link">Game Link ${history.length - index}</a>
                    <button class="btn btn-small" onclick="navigator.clipboard.writeText('${link}'); alert('Copied!');">Copy</button>
                `;
                container.appendChild(item);
            });
            showScreen('history-screen');
        }

        function clearHistory() {
            if(confirm("Clear all history?")) {
                localStorage.removeItem('spellBeeHistory');
                showHistory();
            }
        }

        function adjustZoom(val) {
            document.documentElement.style.setProperty('--game-scale', val);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createBees() {
            const menu = document.getElementById('menu-screen');
            for(let i=0; i<5; i++) {
                const bee = document.createElement('div');
                bee.className = 'pastel-bee';
                bee.style.top = Math.random() * 80 + '%';
                bee.style.animationDelay = (Math.random() * 5) + 's';
                menu.appendChild(bee);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openModeSelect(mode) { 
            gameMode = mode; 
            showScreen('mode-screen'); 
        }

        function confirmSetup() {
            document.getElementById('team-l-label').innerText = document.getElementById('team-a-name').value;
            document.getElementById('team-r-label').innerText = document.getElementById('team-b-name').value;
            scoreA = 0; scoreB = 0;
            updateScoreDisplay();
            startGame(gameStyle);
        }

        function startGame(style) {
            gameStyle = style; 
            if(gameMode === 'duel' && document.getElementById('mode-screen').classList.contains('active')) {
                showScreen('setup-screen');
                return;
            }

            const orderSelector = (gameMode === 'practice') ? 'order-p' : 'order-d';
            const orderVal = document.querySelector(`input[name="${orderSelector}"]:checked`).value;
            
            currentWords = [...originalWords];
            if(orderVal === 'shuffle') shuffleArray(currentWords);

            wordIndex = 0;
            isWaitingForNext = false;
            capsState = { p: false, l: false, r: false };
            layoutState = { p: 'qwerty', l: 'qwerty', r: 'qwerty' };

            hideNextButtons();
            if(gameMode === 'practice') { 
                showScreen('game-screen'); 
                renderRound('p-play', 'p'); 
            } else { 
                showScreen('duel-screen'); 
                renderRound('l-play', 'l'); 
                renderRound('r-play', 'r'); 
            }
        }

        function renderRound(containerId, side, clearDisplay = true) {
            const container = document.getElementById(containerId);
            const currentText = clearDisplay ? "" : (document.getElementById(side + "-display")?.innerText || "");
            container.innerHTML = '';
            
            if(gameStyle === 'spell') {
                const display = document.createElement('div');
                display.id = side + "-display"; 
                display.className = "display-area";
                display.innerText = currentText;
                container.appendChild(display);
                
                const kbWrap = document.createElement('div');
                kbWrap.id = side + "-kb-wrap";
                container.appendChild(kbWrap);
                renderKeyboard(side);
            } else {
                renderUnscramble(container, side, currentWords[wordIndex]);
            }
        }

        function renderKeyboard(side) {
            const kbWrap = document.getElementById(side + "-kb-wrap");
            if(!kbWrap) return;
            kbWrap.innerHTML = '';

            const kb = document.createElement('div'); kb.className = "keyboard";
            const activeKeys = (layoutState[side] === 'qwerty') ? qwerty : symbols;

            activeKeys.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = "kb-row";
                row.forEach(l => {
                    const k = document.createElement('div'); k.className = "key";
                    k.innerText = (capsState[side] && layoutState[side] === 'qwerty') ? l.toUpperCase() : l.toLowerCase();
                    k.onclick = (e) => { e.stopPropagation(); handleInput(side, k.innerText); };
                    rowDiv.appendChild(k);
                });
                kb.appendChild(rowDiv);
            });

            const row4 = document.createElement('div'); row4.className = "kb-row";
            
            const toggleBtn = document.createElement('div');
            toggleBtn.className = "key";
            toggleBtn.innerText = (layoutState[side] === 'qwerty') ? "123" : "ABC";
            toggleBtn.style.width = "60px";
            toggleBtn.onclick = (e) => {
                e.stopPropagation();
                layoutState[side] = (layoutState[side] === 'qwerty') ? 'symbols' : 'qwerty';
                renderKeyboard(side);
            };

            if (layoutState[side] === 'qwerty') {
                const shift = document.createElement('div'); 
                shift.className = "key" + (capsState[side] ? " key-active" : ""); 
                shift.innerText = "SHIFT"; 
                shift.onclick = (e) => { 
                    e.stopPropagation();
                    if(!isWaitingForNext) { 
                        capsState[side] = !capsState[side]; 
                        renderKeyboard(side); 
                    } 
                };
                row4.appendChild(shift);
            }

            const space = document.createElement('div'); space.className = "key"; space.innerText = "SPACE"; space.style.width="80px"; 
            space.onclick = (e) => { e.stopPropagation(); handleInput(side, " "); };
            
            const del = document.createElement('div'); del.className = "key"; del.innerText = "DEL"; 
            del.onclick = (e) => {
                e.stopPropagation();
                if(isWaitingForNext) return;
                const d = document.getElementById(side + "-display"); d.innerText = d.innerText.slice(0, -1);
            };

            row4.appendChild(toggleBtn);
            row4.appendChild(space); 
            row4.appendChild(del);
            kb.appendChild(row4); 
            kbWrap.appendChild(kb);
        }

        function handleInput(side, char) {
            if(isWaitingForNext) return;
            const display = document.getElementById(side + "-display");
            display.innerText += char;
            
            if(capsState[side]) {
                capsState[side] = false;
                renderKeyboard(side);
            }
            
            if(display.innerText.trim().toLowerCase() === currentWords[wordIndex].trim().toLowerCase()) {
                display.classList.add('correct-flash');
                handleWin(side);
            }
        }

        function renderUnscramble(container, side, phrase) {
            const wrapper = document.createElement('div');
            wrapper.className = "unscramble-container";
            const targetDiv = document.createElement('div');
            targetDiv.className = "target-slots";
            targetDiv.id = side + "-target";

            const poolDiv = document.createElement('div');
            poolDiv.className = "letter-pool";
            poolDiv.id = side + "-pool";

            phrase.split(' ').forEach(w => {
                const wordGroup = document.createElement('div');
                wordGroup.className = "word-group";
                w.split('').forEach(char => {
                    const slot = document.createElement('div');
                    slot.className = "slot";
                    slot.onclick = (e) => {
                        e.stopPropagation();
                        if(isWaitingForNext || !slot.innerText) return;
                        const tileId = slot.dataset.tileId;
                        document.getElementById(tileId).style.visibility = "visible";
                        slot.innerText = "";
                        slot.classList.remove('filled');
                    };
                    wordGroup.appendChild(slot);
                });
                targetDiv.appendChild(wordGroup);
            });

            const letters = phrase.replace(/\s/g, '').split('').sort(() => Math.random() - 0.5);
            letters.forEach((l, index) => {
                const tile = document.createElement('div');
                tile.className = "tile";
                tile.id = side + "-tile-" + index;
                tile.innerText = l;
                tile.onclick = (e) => {
                    e.stopPropagation();
                    if(isWaitingForNext) return;
                    const slots = targetDiv.querySelectorAll('.slot');
                    for(let slot of slots) {
                        if(!slot.innerText) {
                            slot.innerText = l;
                            slot.dataset.tileId = tile.id;
                            slot.classList.add('filled');
                            tile.style.visibility = "hidden";
                            checkUnscrambleWin(side, phrase);
                            break;
                        }
                    }
                };
                poolDiv.appendChild(tile);
            });

            wrapper.appendChild(targetDiv);
            wrapper.appendChild(poolDiv);
            container.appendChild(wrapper);
        }

        function checkUnscrambleWin(side, phrase) {
            const slots = document.getElementById(side + "-target").querySelectorAll('.slot');
            let attempt = "";
            const targetNoSpaces = phrase.replace(/\s/g, '');
            slots.forEach(s => { attempt += s.innerText || ""; });
            if(attempt === targetNoSpaces) handleWin(side);
        }

        function handleWin(side) {
            if(isWaitingForNext) return;
            isWaitingForNext = true;
            const wordCount = currentWords[wordIndex].trim().split(/\s+/).length;
            if(side === 'l') scoreA += wordCount;
            if(side === 'r') scoreB += wordCount;
            updateScoreDisplay();
            if(gameMode === 'practice') document.getElementById('next-btn-p').style.display = 'block';
            else document.getElementById('next-btn-duel').style.display = 'block';
        }

        function updateScoreDisplay() {
            if(document.getElementById('score-l')) document.getElementById('score-l').innerText = scoreA;
            if(document.getElementById('score-r')) document.getElementById('score-r').innerText = scoreB;
        }

        function nextWord() {
            wordIndex++;
            isWaitingForNext = false;
            capsState = { p: false, l: false, r: false };
            layoutState = { p: 'qwerty', l: 'qwerty', r: 'qwerty' };
            hideNextButtons();
            if(wordIndex >= currentWords.length) { 
                alert(`GAME OVER!\nFinal Scores:\nTeam A: ${scoreA}\nTeam B: ${scoreB}`); 
                showScreen('menu-screen'); 
            } else {
                if(gameMode === 'practice') renderRound('p-play', 'p');
                else { renderRound('l-play', 'l'); renderRound('r-play', 'r'); }
            }
        }

        function hideNextButtons() {
            const btnP = document.getElementById('next-btn-p');
            const btnD = document.getElementById('next-btn-duel');
            if(btnP) btnP.style.display = 'none';
            if(btnD) btnD.style.display = 'none';
        }

        function speakWord() {
            const u = new SpeechSynthesisUtterance(currentWords[wordIndex]);
            u.lang = 'en-US'; window.speechSynthesis.speak(u);
        }

        function pickStudent(side) {
            let inputId = (side === 'p') ? 'student-list-p' : (side === 'l' ? 'team-a-nums' : 'team-b-nums');
            let val = document.getElementById(inputId).value;
            let nums = [];
            val.split(',').forEach(p => {
                if(p.includes('-')) {
                    let range = p.split('-');
                    for(let i=parseInt(range[0]); i<=parseInt(range[1]); i++) nums.push(i);
                } else nums.push(parseInt(p));
            });
            nums = nums.filter(n => !isNaN(n));
            if(nums.length === 0) return;
            document.getElementById('num-' + side).innerText = nums[Math.floor(Math.random() * nums.length)];
        }

        function saveWords() {
            const list = document.getElementById('word-input').value.split('\n').filter(x => x.trim());
            if(list.length) {
                const encoded = btoa(JSON.stringify(list));
                const fullLink = window.location.href.split('?')[0] + "?w=" + encoded;
                const display = document.getElementById('link-display-box');
                display.innerText = "SHARE THIS LINK: " + fullLink;
                display.style.display = 'block';
                navigator.clipboard.writeText(fullLink);
                alert("Link Copied!");
            }
        }

        function loadByCode() {
            const val = document.getElementById('game-code-input').value;
            if(val.includes('?w=')) window.location.href = val;
            else alert("Please paste a full game link.");
        }
    </script>
</body>
</html>
